<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d4edd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Container -->
  <circle cx="200" cy="200" r="180" fill="rgba(0,217,255,0.05)" stroke="url(#grad1)" stroke-width="2"/>

  <!-- Code Bracket Left -->
  <path d="M 80 150 L 100 170 L 100 230 L 80 250" stroke="url(#grad1)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Code Bracket Right -->
  <path d="M 320 150 L 300 170 L 300 230 L 320 250" stroke="url(#grad1)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main Gear 1 (Top Center) -->
  <g transform="translate(200, 100)">
    <circle r="35" fill="url(#grad1)" opacity="0.8"/>
    <circle r="25" fill="rgba(255,255,255,0.1)"/>
    <!-- Gear teeth -->
    <rect x="-8" y="-40" width="16" height="12" fill="url(#grad1)" rx="2"/>
    <rect x="28" y="-20" width="12" height="16" fill="url(#grad1)" rx="2" transform="rotate(45 34 0)"/>
    <rect x="28" y="20" width="12" height="16" fill="url(#grad1)" rx="2" transform="rotate(-45 34 0)"/>
    <rect x="-8" y="28" width="16" height="12" fill="url(#grad1)" rx="2"/>
    <rect x="-40" y="20" width="12" height="16" fill="url(#grad1)" rx="2" transform="rotate(45 -34 0)"/>
    <rect x="-40" y="-20" width="12" height="16" fill="url(#grad1)" rx="2" transform="rotate(-45 -34 0)"/>
  </g>

  <!-- Main Gear 2 (Bottom Right) -->
  <g transform="translate(280, 260)">
    <circle r="40" fill="url(#grad2)" opacity="0.8"/>
    <circle r="28" fill="rgba(255,255,255,0.1)"/>
    <!-- Gear teeth -->
    <rect x="-10" y="-45" width="20" height="14" fill="url(#grad2)" rx="2"/>
    <rect x="32" y="-22" width="14" height="20" fill="url(#grad2)" rx="2" transform="rotate(45 39 0)"/>
    <rect x="32" y="22" width="14" height="20" fill="url(#grad2)" rx="2" transform="rotate(-45 39 0)"/>
    <rect x="-10" y="31" width="20" height="14" fill="url(#grad2)" rx="2"/>
    <rect x="-45" y="22" width="14" height="20" fill="url(#grad2)" rx="2" transform="rotate(45 -39 0)"/>
    <rect x="-45" y="-22" width="14" height="20" fill="url(#grad2)" rx="2" transform="rotate(-45 -39 0)"/>
  </g>

  <!-- Main Gear 3 (Bottom Left) -->
  <g transform="translate(120, 280)">
    <circle r="30" fill="url(#grad1)" opacity="0.8"/>
    <circle r="20" fill="rgba(255,255,255,0.1)"/>
    <!-- Gear teeth -->
    <rect x="-6" y="-35" width="12" height="10" fill="url(#grad1)" rx="2"/>
    <rect x="24" y="-17" width="10" height="12" fill="url(#grad1)" rx="2" transform="rotate(45 29 0)"/>
    <rect x="24" y="17" width="10" height="12" fill="url(#grad1)" rx="2" transform="rotate(-45 29 0)"/>
    <rect x="-6" y="25" width="12" height="10" fill="url(#grad1)" rx="2"/>
    <rect x="-35" y="17" width="10" height="12" fill="url(#grad1)" rx="2" transform="rotate(45 -29 0)"/>
    <rect x="-35" y="-17" width="10" height="12" fill="url(#grad1)" rx="2" transform="rotate(-45 -29 0)"/>
  </g>

  <!-- Code Lines (Center) -->
  <g transform="translate(200, 200)">
    <!-- Vertical Code Line -->
    <rect x="-2" y="-50" width="4" height="100" fill="url(#grad1)" opacity="0.6" rx="2"/>
    
    <!-- Horizontal Code Lines -->
    <rect x="-40" y="-15" width="80" height="3" fill="url(#grad1)" opacity="0.5" rx="1.5"/>
    <rect x="-45" y="5" width="90" height="3" fill="url(#grad1)" opacity="0.5" rx="1.5"/>
    <rect x="-35" y="25" width="70" height="3" fill="url(#grad1)" opacity="0.4" rx="1.5"/>
  </g>

  <!-- Tech Dots -->
  <circle cx="100" cy="120" r="6" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="300" cy="140" r="5" fill="url(#grad1)" opacity="0.7"/>
  <circle cx="320" cy="280" r="7" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="80" cy="300" r="6" fill="url(#grad1)" opacity="0.7"/>
  <circle cx="140" cy="100" r="5" fill="url(#grad2)" opacity="0.6"/>

  <!-- Connecting Lines -->
  <line x1="200" y1="100" x2="200" y2="200" stroke="url(#grad1)" stroke-width="2" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="200" y1="200" x2="280" y2="260" stroke="url(#grad2)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  <line x1="200" y1="200" x2="120" y2="280" stroke="url(#grad1)" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Decorative Elements -->
  <circle cx="160" cy="160" r="4" fill="url(#grad1)" opacity="0.5"/>
  <circle cx="240" cy="160" r="4" fill="url(#grad2)" opacity="0.5"/>
  <circle cx="200" cy="240" r="4" fill="url(#grad1)" opacity="0.5"/>
</svg>
